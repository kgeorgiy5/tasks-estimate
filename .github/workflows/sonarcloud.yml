on:
  pull_request:
    branches:
      - "**"
      - "!development"
      - "!main"
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: SonarQube Scan
      uses: sonarsource/sonarcloud-github-action@4.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
    
