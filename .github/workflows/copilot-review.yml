name: "GPT-5 Mini Code Review"
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read 
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Fetch PR Diff
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Use the environment variables with quotes to prevent shell injection
          git diff "origin/$BASE_REF"..."origin/$HEAD_REF" > pr_diff.txt

      - name: Create Prompt File
        run: |
          cat <<'EOF' > review_prompt.yml
          messages:
            - role: system
              content: |
                Review this code diff for logic errors, performance and code quality. Issues:
                - I want you to mark each issue with traffic light colors.
                - 🔴 RED (use RED emoji) -- critical bugs, UX/UI issues, accessibility issues, flawed logic, etc.
                - 🟡 YELLOW (use YELLOW emoji) -- code quality issues: 
                  Consistency (uniform/conventional), Formatted (systematic/regular), Conventional (language conventions), 
                  Identifiable (regular structure), Intentionality (precise/purposeful), Clear (self-explanatory), 
                  Logical (sound instructions), Complete (comprehensive), Efficient (resource economical), 
                  Adaptability (easy to evolve), Focused (single scope), Distinct (unique/no duplication), 
                  Modular (separated parts), Tested (automated checks), Responsibility (ethical/lawful), 
                  Trustworthy (no private info), Respectful (inclusive language).
                - 🟢 GREEN (use GREEN emoji) -- not exactly wrong, but there is an alternative implementation.
                - This tag should be assigned for each issue individually, don't group them.
                - Use this template: '## <traffic light emoji> <issue type>\n<content>'
                - Be concise.
            - role: user
              content: |
                Review this code diff:
                {{.diff}}
          EOF

      - name: AI Review with GPT-5 Mini
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh extension install github/gh-models || true
          git diff "origin/${{ github.base_ref }}"...HEAD > pr_diff.txt
          gh models run openai/gpt-4o-mini --file review_prompt.yml --var diff="$(cat pr_diff.txt)" > review_feedback.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const feedback = fs.readFileSync('review_feedback.txt', 'utf8');
            if (feedback.trim().length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "### 🤖 AI Code Review\n\n" + feedback
              });
            }
