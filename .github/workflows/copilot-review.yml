name: "GPT-5 Mini Code Review"
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Fetch PR Diff
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Use the environment variables with quotes to prevent shell injection
          git diff "origin/$BASE_REF"..."origin/$HEAD_REF" > pr_diff.txt

      - name: AI Review with GPT-5 Mini
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install the models extension if not present
          gh extension install github/gh-models || true
          
          # Run the review using the specific gpt-5-mini identifier
          gh models run "gpt-5-mini" "Review this code diff for logic errors, performance and code quality. Issues: - I want you to mark each issue with traffic light colors.  - RED (use RED emoji) -- critical bugs, UX/UI issues, accessibility issues, flawed logic, etc. - YELLOW (use YELLOW emoji) -- code quality issues: Consistency The code is written in a uniform and conventional way. All the code looks similar and follows a regular pattern, even with multiple contributors at different times. Consistent code is formatted, conventional, and identifiable. Formatted The code presentation is systematic and regular. Non-semantic choices, such as spacing, indentation, and character placement, remain consistent throughout the codebase, maintaining uniformity across files and authors. Conventional The code performs tasks with expected instructions. Faced with equally good options, the code adheres to a single choice across all instances, preferring language conventions. This includes using the appropriate programming interfaces and language features. Identifiable The names follow a regular structure based on language conventions. The casing, word separators, suffixes, and prefixes used in the identifiers have purpose, without arbitrary differences. Intentionality The code is precise and purposeful. Every instruction makes sense, is adequately formed, and clearly communicates its behavior. Intentional code is clear, logical, complete, and efficient. Clear The code is self-explanatory, transparently communicating its functionality. It is written in a straightforward way that minimizes ambiguity, avoiding unnecessary clever or intricate solutions. Logical The code has well-formed and sound instructions that work together. It is free of explicit errors, contradictions, and commands that could be unpredictable or objectionable. Complete The code constructs are comprehensive and used adequately and thoroughly. The code is functional and achieves its implied goals. There are no obviously incomplete or lacking solutions. Efficient The code uses resources without needless waste. It prioritizes economical options when available, avoiding unnecessary consumption of memory, processor, disk, or network resources. Adaptability The code is structured to be easy to evolve and develop with confidence. It makes extending or repurposing its parts easy and promotes localized changes without undesirable side-effects. Adaptable code is focused, distinct, modular, and tested. Focused The code has a single, narrow, and specific scope. Each unit should have only one concise purpose, without an overwhelming accumulation of instructions or excessive amounts of complexity. Distinct The code procedures and data are unique and distinctive, without undue duplication. The codebase has no significant repetition where it could be decomposed into smaller shared segments. Modular The code has been organized and distributed to emphasize the separation between its parts. The relationships within the code are carefully managed, ensuring they are minimal and clearly defined. Tested The code has automated checks that provide confidence in the functionality. It has enough test coverage which enables changes in implementation without the risk of functional regressions. Responsibility The code takes into account its ethical obligations on data, as well as societal norms. Responsible code is lawful, trustworthy, and respectful. Lawful The code respects licensing and copyright regulation. It exercises the creator’s rights and honors other’s rights to license their own code. Trustworthy The code abstains from revealing or hard-coding private information. It preserves sensitive private information such as credentials and personally identifying information. Respectful The code refrains from using discriminatory and offensive language. It chooses to prioritize inclusive terminology whenever an alternative exists that conveys the same meaning.  - GREEN (use GREEN emoji) -- not exactly wrong, but there is an alternative implementation that could work for this situation. - This tag should be assigned for each issue individually, don't group them.  - Use this template: '## <traffic light emoji> <issue type><new line><content>'  - Be concise: $(cat pr_diff.txt)" > review.txt

      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "# 🤖 GPT-5 Mini Review\n\n" + body
            })
