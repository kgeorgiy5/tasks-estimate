name: "GPT-5 Mini Code Review"
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Fetch PR Diff
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Use the environment variables with quotes to prevent shell injection
          git diff "origin/$BASE_REF"..."origin/$HEAD_REF" > pr_diff.txt

      - name: AI Review with GPT-5 Mini
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh extension install github/gh-models || true
          
          # Capture the diff into a file first
          git diff "origin/${{ github.base_ref }}"...HEAD > pr_diff.txt
                    
          # Run the model using the --file flag and --var for the diff
          gh models run "openai/gpt-5-mini" "Review the PR using the instructions from the attached file." \
            --file .github/scripts/review_prompt.yml \
            --var diff="$(cat pr_diff.txt)" > review_feedback.txt

      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "# 🤖 GPT-5 Mini Review\n\n" + body
            })
